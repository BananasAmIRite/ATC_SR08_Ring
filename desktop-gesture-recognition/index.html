<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>
    <body class="bg-dark text-light">
        <div class="container py-4">
            <div class="card bg-dark text-light border-secondary shadow-sm mx-auto" style="max-width: 540px">
                <div class="card-body">
                    <h2 class="text-center mb-4">Ring Gesture Controls</h2>
                    <div class="mb-3 d-flex gap-2 flex-wrap justify-content-center">
                        <button class="btn btn-primary" id="connect">Connect</button>
                        <button class="btn btn-secondary" id="disconnect">Disconnect</button>
                    </div>
                    <div class="mb-3 text-center">
                        <button class="btn btn-primary" id="load-model">Load Model</button>
                    </div>
                    <div class="mb-3 d-flex gap-2 flex-wrap justify-content-center">
                        <button class="btn btn-success" id="plot">Start Recording</button>
                        <button class="btn btn-danger" id="stop-plot">Stop Recording</button>
                    </div>

                    <div class="accordion mb-3" id="debugAccordion">
                        <div class="accordion-item bg-dark text-light border-secondary">
                            <h2 class="accordion-header" id="debugHeading">
                                <button
                                    class="accordion-button collapsed bg-dark text-light"
                                    type="button"
                                    data-bs-toggle="collapse"
                                    data-bs-target="#debugCollapse"
                                    aria-expanded="false"
                                    aria-controls="debugCollapse"
                                >
                                    Debug
                                </button>
                            </h2>
                            <div
                                id="debugCollapse"
                                class="accordion-collapse collapse"
                                aria-labelledby="debugHeading"
                                data-bs-parent="#debugAccordion"
                            >
                                <div class="accordion-body bg-dark text-light">
                                    <h5 class="mb-2">Classification Data</h5>
                                    <div id="ml-classify-result" class="bg-dark text-light border-0 mb-2 mt-2"></div>
                                    <h5 class="mb-2">Accelerometer Chart</h5>
                                    <div class="bg-dark rounded p-2 border border-secondary">
                                        <canvas id="accel-chart" class="bg-dark"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
        <!-- Your TypeScript entry (Vite will handle this) -->
        <script type="module" src="/src/renderer.ts"></script>
    </body>
</html>
